<!DOCTYPE html>
<html>
  
<head>
  <title>BUPSENT</title>
<style>
  body{
   background:black;
   color:gray;
  }
  #system{
   display:flex;
   flex-direction:column;
   height:100vh;
   justify-content:center;
   align-items:center;
  }
  #searchbox{
   display:flex;
   flex-direction:row;
   justify-content:center;
   align-items:center;
   gap:3px;
  }
  #title{
   font-size:50px;
   color:darkturquoise;
   text-shadow:0px 0px 50px cyan;
  }
  #search{
   background:black;
   color:gray;
   width:250px;
   padding:5px;
   border:1px solid cyan;
   border-radius:3px;
  }
  #starting-button{
   background:black;
   color:gray;
   padding:5px;
   border:1px solid cyan;
   border-radius:3px;
  }
</style>
  
</head>

<body>
  <div id="system">
  <h1 id="title">BUPSENT</h1>
  <div id="searchbox">
  <input id="search" type="text" placeholder="Ask anything...">
  <button id="starting-button">@</button>
  </div>
  </div>
<script>
  const search = document.getElementById("search");
  const startingButton = document.getElementById("starting-button");
  function askAI() {
     alert(search.value);
  }
  startingButton.addEventListener("click", function () {
  askAI();
  });
  
  search.addEventListener("keydown", function (event) {
    if (event.key === "Enter") {
  askAI();
    }});

</script>
  
</body>

</html>
