<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BPS TERMINAL</title>

<style>

body{
    margin:0;
    background:

linear-gradient(
rgba(0,234,255,.05) 1px,
transparent 1px
),

linear-gradient(
90deg,
rgba(0,234,255,.05) 1px,
transparent 1px
),

#02070a;

background-size:
40px 40px,
40px 40px,
auto;
    color:#00eaff;

    font-family:
    "Consolas",
    monospace;

    padding:20px;

    min-height:100vh;
}

/* 첫 화면 */

#homePage{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;
}

.box{

    text-align:center;

    padding:40px;

    border:2px solid #00ffff;

    border-radius:20px;

    box-shadow:
    0 0 20px #00ffff,
    0 0 40px #00ffff;
}

h1{

    text-shadow:
    0 0 10px #00ffff,
    0 0 20px #00ffff;
}

button{

    background:#ff0088;

    color:white;

    border:none;

    padding:0 40px;

    height:58px;

    font-size:18px;

    font-weight:bold;

    letter-spacing:2px;

    border-radius:4px;

    cursor:pointer;

    box-shadow:
    0 0 10px #ff0088,
    0 0 25px #ff0088,
    0 0 50px rgba(255,0,136,.5);

    transition:.25s;
}

button:hover{

    transform:translateY(-2px);

    box-shadow:
    0 0 20px #ff0088,
    0 0 40px #ff0088,
    0 0 80px rgba(255,0,136,.8);
}
    
/* 게시판 */

#boardPage{

    display:none;

    padding:20px;
}

input{

    font-family:"Consolas", monospace;
    
    width:100%;

    height:60px;

    background:#000814;

    color:#00eaff;

    border:1px solid #00eaff;

    padding-left:20px;

    font-size:18px;

    box-sizing:border-box;

    box-shadow:
    inset 0 0 10px rgba(0,234,255,.3),
    0 0 10px rgba(0,234,255,.5);

    margin-bottom:15px;
}
textarea{

    font-family:"Consolas", monospace;
    
    width:100%;

    height:220px;

    background:#000814;

    color:#00eaff;

    border:1px solid #00eaff;

    padding:20px;

    font-size:18px;

    resize:none;

    box-sizing:border-box;

    box-shadow:
    inset 0 0 10px rgba(0,234,255,.3),
    0 0 10px rgba(0,234,255,.5);

    margin-bottom:8px;
}

.post{

    overflow:hidden;
    
    border:1px solid #00eaff;

    background:#041018;

    padding:18px;

    margin-top:15px;

    cursor:pointer;

    transition:.3s;

    box-shadow:
    0 0 8px rgba(0,234,255,.5);

    position:relative;
}

.post:hover{

    transform:translateX(8px);

    box-shadow:
    0 0 15px #00eaff,
    0 0 30px rgba(0,234,255,.7);
}

#viewBox{

    display:none;

    margin-top:30px;

    border:1px solid #00eaff;

    background:#000814;

    padding:25px;

    box-shadow:
    0 0 15px #00eaff,
    inset 0 0 10px rgba(0,234,255,.2);

    position:relative;

    overflow:hidden;
}

.mainTitle{

    text-align:center;

    font-size:70px;

    letter-spacing:8px;

    color:#00eaff;

    margin-top:20px;

    margin-bottom:10px;

    text-shadow:
    0 0 10px #00eaff,
    0 0 20px #00eaff,
    0 0 40px #00eaff;

    animation:neonPulse 2.5s infinite;
    
}

.subTitle{

    text-align:center;

    color:#00eaff;

    letter-spacing:3px;

    margin-bottom:40px;

    opacity:0.8;
}    

.listHeader{

    font-size:28px;

    font-weight:bold;

    color:#00eaff;

    margin-top:20px;

    margin-bottom:20px;

    border-bottom:1px solid #00eaff;

    padding-bottom:10px;

    text-shadow:
    0 0 10px #00eaff;
}

.listIcon{

    color:#00eaff;

    margin-right:10px;
}    

.datePanel{

    float:right;

    width:250px;

    background:#021018;

    border:1px solid #00eaff;

    padding:15px;

    box-shadow:
    0 0 15px rgba(0,234,255,.6);

    color:#00eaff;

    font-size:13px;

    line-height:1.8;

    margin-left:20px;
}

#viewTitle{

    color:#00eaff;

    font-size:32px;

    margin-bottom:20px;

    text-shadow:
    0 0 10px #00eaff;
}

.terminalFrame{

    max-width:1200px;

    margin:auto;

    border:2px solid #00eaff;

    padding:25px;

    box-shadow:
    0 0 10px #00eaff,
    0 0 30px rgba(0,234,255,.5);

    position:relative;

    min-height:90vh;
}

.terminalFrame::before{

    content:"";

    position:absolute;

    top:10px;

    left:10px;

    width:40px;

    height:40px;

    border-top:3px solid #00eaff;

    border-left:3px solid #00eaff;
}

.terminalFrame::after{

    content:"";

    position:absolute;

    bottom:10px;

    right:10px;

    width:40px;

    height:40px;

    border-bottom:3px solid #00eaff;

    border-right:3px solid #00eaff;
}

.scanLine{

    height:2px;

    background:#00eaff;

    margin-bottom:20px;

    box-shadow:
    0 0 10px #00eaff;
}
    
.editBtn{

    background:#00cfff;

    color:black;

    box-shadow:
    0 0 10px #00cfff,
    0 0 30px #00cfff;
}

.editBtn:hover{

    box-shadow:
    0 0 20px #00cfff,
    0 0 50px #00cfff;
}

.deleteBtn{

    background:#ff3333;

    color:white;

    box-shadow:
    0 0 10px #ff3333,
    0 0 30px #ff3333;
}

.deleteBtn:hover{

    box-shadow:
    0 0 20px #ff3333,
    0 0 50px #ff3333;
}

.accessBtn{

    font-size:22px;

    padding:18px 60px;

    letter-spacing:4px;
}

#totalPosts{

    color:#00eaff;

    margin-bottom:20px;

    opacity:.8;

    font-size:14px;
}

body::after{
    content:"";

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    pointer-events:none;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 4px
    );

    z-index:999;
}

.systemStatus{
    text-align:right;

    color:#00ff88;

    font-size:13px;

    letter-spacing:2px;

    margin-bottom:10px;

    text-shadow:
    0 0 10px #00ff88;
}

.terminalFrame::before{
    content:"";
    position:absolute;
    top:15px;
    left:15px;
    width:120px;
    height:2px;
    background:#00eaff;
    box-shadow:0 0 15px #00eaff;
}

.terminalFrame::after{
    content:"";
    position:absolute;
    bottom:15px;
    right:15px;
    width:120px;
    height:2px;
    background:#ff0088;
    box-shadow:0 0 15px #ff0088;
}

#viewTitle{

    font-size:32px;

    color:#00eaff;

    letter-spacing:2px;

    text-shadow:
    0 0 15px #00eaff;

    margin-bottom:20px;
}

#viewContent{

    color:#b8ffff;

    line-height:1.8;

    font-size:16px;

    white-space:pre-wrap;
}

.hudInfo{
    color:#00eaff;
    font-size:12px;
    letter-spacing:2px;
    opacity:.7;
    margin-bottom:25px;
    border-bottom:1px solid rgba(0,234,255,.4);
    padding-bottom:10px;
}

@keyframes neonPulse{
    0%{
        opacity:1;
        text-shadow:
        0 0 10px #00eaff,
        0 0 20px #00eaff,
        0 0 40px #00eaff;
    }

    50%{
        opacity:.75;
        text-shadow:
        0 0 5px #00eaff,
        0 0 10px #00eaff;
    }

    100%{
        opacity:1;
        text-shadow:
        0 0 10px #00eaff,
        0 0 20px #00eaff,
        0 0 40px #00eaff;
    }
}

.post::before{

    content:"";

    position:absolute;

    top:0;

    left:0;

    width:4px;

    height:100%;

    background:#00eaff;

    box-shadow:
    0 0 10px #00eaff;
}

.liveDot{

    position:relative;
    top:-2px;
    
    display:inline-block;

    width:10px;

    height:10px;

    border-radius:50%;

    background:#00ff66;

    margin-left:10px;

    box-shadow:
    0 0 10px #00ff66;

    animation:blinkDot 1s infinite;
}

@keyframes blinkDot{

    50%{
        opacity:.3;
    }
}

.clockBox{
    text-align:right;
    color:#00eaff;
    font-size:13px;
    letter-spacing:2px;
    margin-bottom:10px;
    text-shadow:0 0 10px #00eaff;
}

.boardTitle{

    text-align:center;

    font-size:80px;

    font-weight:bold;

    letter-spacing:14px;

    color:#00eaff;

    margin-top:-30px;

    margin-bottom:30px;

    text-shadow:
    0 0 10px #00eaff,
    0 0 20px #00eaff,
    0 0 40px #00eaff,
    0 0 80px #00eaff;
}

.listHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.listLeft{
    display:flex;
    align-items:center;
    gap:10px;
}
    
.actionBar{

    display:flex;

    gap:15px;

    margin-top:5px;

    margin-bottom:15px;

    align-items:center;

    height:58px;

    margin:0;
}

#searchInput{

    flex:1;

    height:58px;

    position:relative;
    
    top:6px;

    background:#000814;

    color:#00eaff;

    border:1px solid #00eaff;

    padding-left:20px;

    font-size:16px;

    box-sizing:border-box;

    box-shadow:
    inset 0 0 10px rgba(0,234,255,.3),
    0 0 10px rgba(0,234,255,.5);
}

.favoritePost{
    border:1px solid #66ffff;

    box-shadow:
    0 0 12px rgba(102,255,255,.8);
}

</style>
</head>

<body>

<!-- 첫 화면 -->

<div class="terminalFrame">
    <div class="systemStatus">
SYSTEM ONLINE
</div>

<div id="clock" class="clockBox">
0000-00-00 00:00:00
</div>    

<div class="hudInfo">
NODE: BPS-01  /  ACCESS LEVEL: PRIVATE  /  MODE: ARCHIVE
</div>    
    
<div id="homePage">

<div class="box">

<h1 class="mainTitle">
BPS TERMINAL
</h1>

<div class="subTitle">
SECURE PERSONAL ARCHIVE SYSTEM
</div>

<button class="accessBtn" onclick="enterSystem()">
ACCESS
</button>

</div>

</div>

<!-- 게시판 화면 -->

<div id="boardPage">

<h1 class="boardTitle">
BPS TERMINAL
</h1>
    
<div class="scanLine"></div>

<div class="listHeader">

    <div class="listLeft">
        <span class="listIcon">■</span>
        LIST <span class="liveDot"></span>
    </div>

    <div id="totalPosts">
        TOTAL FILES : 0
    </div>

</div>

<input
id="titleInput"
placeholder="ENTER FILE TITLE...">

<textarea
id="contentInput"
placeholder="WRITE ARCHIVE DATA..."></textarea>

<div class="actionBar">

<button onclick="addPost()">
SAVE LOG
</button>

<input
id="searchInput"
placeholder="SEARCH FILE..."
onkeyup="searchPosts()">

</div>

<div id="postList"></div>

<div id="viewBox">

<h2 id="viewTitle"></h2>

<button
id="favoriteBtn"
onclick="toggleFavorite()"
style="
float:right;
width:45px;
height:45px;
font-size:22px;
padding:0;
background:#021018;
border:1px solid #00eaff;
color:white;
">
☆
</button>

<div id="dateInfo" class="datePanel">
</div>

<p id="viewContent"></p>

<button class="editBtn" onclick="editPost()">
EDIT FILE
</button>

<button class="deleteBtn" onclick="deletePost()">
PURGE
</button>

</div>

</div>

<script>

let posts = [];

let currentPost = -1;

function enterSystem(){

    document.getElementById("homePage").style.display =
    "none";

    document.getElementById("boardPage").style.display =
    "block";
}

function addPost(){

    const title =
    document.getElementById("titleInput").value;

    const content =
    document.getElementById("contentInput").value;

    if(title === "" || content === ""){

        alert("제목과 내용을 입력하세요");

        return;
    }

    const now = new Date();

const dateString =
now.getFullYear() + "-" +
String(now.getMonth()+1).padStart(2,"0") + "-" +
String(now.getDate()).padStart(2,"0") + " " +
String(now.getHours()).padStart(2,"0") + ":" +
String(now.getMinutes()).padStart(2,"0");

posts.push({

    title:title,

    content:content,

    created:dateString,

    updated:dateString,

    edited:false,

    favorite:false
});

    savePosts();

    renderPosts();


    document.getElementById("titleInput").value = "";

    document.getElementById("contentInput").value = "";
}

function renderPosts(){

    const list =
    document.getElementById("postList");

    list.innerHTML = "";

    posts.sort((a,b)=>{

    if(a.favorite === b.favorite){

        return 0;
    }

    return a.favorite ? -1 : 1;
});

    posts.forEach((post,index)=>{

        const div =
        document.createElement("div");

        div.className = post.favorite ? "post favoritePost" : "post";

        div.innerHTML =

"<div style='display:flex;justify-content:space-between;'>"

+

"<span style='font-size:18px;font-weight:bold;'>"

+ (post.favorite ? "▣ " : "") + post.title +

"</span>"

+

"<span style='color:#00eaff;font-size:12px;opacity:.7;position:relative;top:3px;'>"

+

(post.edited ? "* " : "")

+

post.updated

+

"</span>"

+

"</div>";

                div.onclick = function(){

            openPost(index);
        };

        list.prepend(div);
    });

    document.getElementById("totalPosts").innerText =
    "TOTAL FILES : " + posts.length;
}

function openPost(index){

    currentPost = index;

    document.getElementById("viewBox").style.display =
    "block";

    document.getElementById("viewTitle").innerText =
    posts[index].title;

    document.getElementById("viewContent").innerText =
    posts[index].content;

document.getElementById("dateInfo").innerHTML =

"작성일<br>" +

posts[index].created +

"<br><br>" +

"최종수정<br>" +

posts[index].updated;


document.getElementById("titleInput").value =
posts[index].title;

document.getElementById("contentInput").value =
posts[index].content;

const favoriteBtn =
document.getElementById("favoriteBtn");

if(posts[index].favorite){

    favoriteBtn.innerText = "★";

    favoriteBtn.style.color = "#ffd700";

}else{

    favoriteBtn.innerText = "☆";

    favoriteBtn.style.color = "white";
}

}

function editPost(){

    if(currentPost < 0){

        return;
    }

    posts[currentPost].title =
    document.getElementById("titleInput").value;

    posts[currentPost].content =
    document.getElementById("contentInput").value;

const now = new Date();

posts[currentPost].updated =

now.getFullYear() + "-" +
String(now.getMonth()+1).padStart(2,"0") + "-" +
String(now.getDate()).padStart(2,"0") + " " +
String(now.getHours()).padStart(2,"0") + ":" +
String(now.getMinutes()).padStart(2,"0");

posts[currentPost].edited = true;

    savePosts();

    renderPosts();

    openPost(currentPost);

    alert("수정 완료");
}

function toggleFavorite(){

    if(currentPost < 0){
        return;
    }

    posts[currentPost].favorite =
    !posts[currentPost].favorite;

    savePosts();

    renderPosts();

    openPost(currentPost);
}

function deletePost(){

    if(currentPost < 0){

        return;
    }

    posts.splice(currentPost,1);

    savePosts();

    renderPosts();

    document.getElementById("viewBox").style.display =
    "none";
}

function savePosts(){

    localStorage.setItem(
        "bps_posts",
        JSON.stringify(posts)
    );
}

function loadPosts(){

    const saved =
    localStorage.getItem("bps_posts");

    if(saved){

        posts =
        JSON.parse(saved);

        renderPosts();
    }
}

loadPosts();

function searchPosts(){

    const keyword =

    document
    .getElementById("searchInput")
    .value
    .toLowerCase();

    const cards =

    document.querySelectorAll(".post");

    cards.forEach(card=>{

        if(
            card.innerText
            .toLowerCase()
            .includes(keyword)
        ){

            card.style.display = "block";

        }else{

            card.style.display = "none";
        }

    });
}

function updateClock(){

    const now = new Date();

    const time =
    now.getFullYear() + "-" +
    String(now.getMonth()+1).padStart(2,"0") + "-" +
    String(now.getDate()).padStart(2,"0") + " " +
    String(now.getHours()).padStart(2,"0") + ":" +
    String(now.getMinutes()).padStart(2,"0") + ":" +
    String(now.getSeconds()).padStart(2,"0");

    document.getElementById("clock").innerText = time;
}

setInterval(updateClock,1000);

updateClock();    

</script>
</div>
</body>
</html>
