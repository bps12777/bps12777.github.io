<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BPS TERMINAL</title>

<style>

body{
    margin:0;
    background:black;
    color:#00ffff;
    font-family:Arial;
}

/* 첫 화면 */

#homePage{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;
}

.box{

    text-align:center;

    padding:40px;

    border:2px solid #00ffff;

    border-radius:20px;

    box-shadow:
    0 0 20px #00ffff,
    0 0 40px #00ffff;
}

h1{

    text-shadow:
    0 0 10px #00ffff,
    0 0 20px #00ffff;
}

button{

    background:#ff00ff;

    color:white;

    border:none;

    padding:12px 25px;

    border-radius:10px;

    cursor:pointer;

    margin:5px;

    box-shadow:
    0 0 10px #ff00ff;
}

/* 게시판 */

#boardPage{

    display:none;

    padding:20px;
}

input{

    width:100%;

    padding:10px;

    margin-bottom:10px;

    background:black;

    color:#00ffff;

    border:1px solid #00ffff;

    box-sizing:border-box;
}

textarea{

    width:100%;

    height:150px;

    padding:10px;

    background:black;

    color:#00ffff;

    border:1px solid #00ffff;

    box-sizing:border-box;
}

.post{

    border:1px solid #00ffff;

    padding:10px;

    margin-top:10px;

    cursor:pointer;

    box-shadow:
    0 0 10px #00ffff;
}

.post:hover{

    box-shadow:
    0 0 20px #00ffff;
}

#viewBox{

    display:none;

    margin-top:20px;

    border:1px solid #00ffff;

    padding:15px;

    box-shadow:
    0 0 10px #00ffff;
}

</style>
</head>

<body>

<!-- 첫 화면 -->

<div id="homePage">

<div class="box">

<h1>BPS TERMINAL</h1>

<button onclick="enterSystem()">
접속
</button>

</div>

</div>

<!-- 게시판 화면 -->

<div id="boardPage">

<h2>LIST</h2>

<input
id="titleInput"
placeholder="제목">

<textarea
id="contentInput"
placeholder="내용"></textarea>

<br><br>

<button onclick="addPost()">
저장
</button>

<div id="postList"></div>

<div id="viewBox">

<h3 id="viewTitle"></h3>

<p id="viewContent"></p>

<button onclick="editPost()">
수정
</button>

<button onclick="deletePost()">
삭제
</button>

</div>

</div>

<script>

let posts = [];

let currentPost = -1;

function enterSystem(){

    document.getElementById("homePage").style.display =
    "none";

    document.getElementById("boardPage").style.display =
    "block";
}

function addPost(){

    const title =
    document.getElementById("titleInput").value;

    const content =
    document.getElementById("contentInput").value;

    if(title === "" || content === ""){

        alert("제목과 내용을 입력하세요");

        return;
    }

    const now = new Date();

const dateString =
now.getFullYear() + "-" +
String(now.getMonth()+1).padStart(2,"0") + "-" +
String(now.getDate()).padStart(2,"0") + " " +
String(now.getHours()).padStart(2,"0") + ":" +
String(now.getMinutes()).padStart(2,"0");

posts.push({

    title:title,

    content:content,

    date:dateString,

    edited:false
});

    savePosts();

    renderPosts();

    document.getElementById("titleInput").value = "";

    document.getElementById("contentInput").value = "";
}

function renderPosts(){

    const list =
    document.getElementById("postList");

    list.innerHTML = "";

    posts.forEach((post,index)=>{

        const div =
        document.createElement("div");

        div.className = "post";

        div.innerHTML =
        div.innerHTML =

"<div style='display:flex;justify-content:space-between;'>"

+

"<span>" + post.title + "</span>"

+

"<span style='color:#888;font-size:12px;'>"

+

(post.edited ? "* " : "")

+

post.date

+

"</span>"

+

"</div>";

        div.onclick = function(){

            openPost(index);
        };

        list.prepend(div);
    });
}

function openPost(index){

    currentPost = index;

    document.getElementById("viewBox").style.display =
    "block";

    document.getElementById("viewTitle").innerText =
    posts[index].title;

    document.getElementById("viewContent").innerText =
    posts[index].content;

document.getElementById("titleInput").value =
posts[index].title;

document.getElementById("contentInput").value =
posts[index].content;
}

function editPost(){

    if(currentPost < 0){

        return;
    }

    posts[currentPost].title =
    document.getElementById("titleInput").value;

    posts[currentPost].content =
    document.getElementById("contentInput").value;

const now = new Date();

posts[currentPost].date =

now.getFullYear() + "-" +
String(now.getMonth()+1).padStart(2,"0") + "-" +
String(now.getDate()).padStart(2,"0") + " " +
String(now.getHours()).padStart(2,"0") + ":" +
String(now.getMinutes()).padStart(2,"0");

posts[currentPost].edited = true;

    savePosts();

    renderPosts();

    openPost(currentPost);

    alert("수정 완료");
}

function deletePost(){

    if(currentPost < 0){

        return;
    }

    posts.splice(currentPost,1);

    savePosts();

    renderPosts();

    document.getElementById("viewBox").style.display =
    "none";
}

function savePosts(){

    localStorage.setItem(
        "bps_posts",
        JSON.stringify(posts)
    );
}

function loadPosts(){

    const saved =
    localStorage.getItem("bps_posts");

    if(saved){

        posts =
        JSON.parse(saved);

        renderPosts();
    }
}

loadPosts();

</script>

</body>
</html>
