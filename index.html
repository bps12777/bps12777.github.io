<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BPS TERMINAL</title>

<style>

body{
    margin:0;
    background:#02070a;
    color:#00eaff;

    font-family:
    "Consolas",
    monospace;

    padding:20px;

    min-height:100vh;
}

/* 첫 화면 */

#homePage{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;
}

.box{

    text-align:center;

    padding:40px;

    border:2px solid #00ffff;

    border-radius:20px;

    box-shadow:
    0 0 20px #00ffff,
    0 0 40px #00ffff;
}

h1{

    text-shadow:
    0 0 10px #00ffff,
    0 0 20px #00ffff;
}

button{

    background:#ff0088;

    color:white;

    border:none;

    padding:15px 40px;

    font-size:18px;

    font-weight:bold;

    letter-spacing:2px;

    border-radius:4px;

    cursor:pointer;

    box-shadow:
    0 0 10px #ff0088,
    0 0 25px #ff0088,
    0 0 50px rgba(255,0,136,.5);

    transition:.25s;
}

button:hover{

    transform:translateY(-2px);

    box-shadow:
    0 0 20px #ff0088,
    0 0 40px #ff0088,
    0 0 80px rgba(255,0,136,.8);
}
    
/* 게시판 */

#boardPage{

    display:none;

    padding:20px;
}

input{

    width:100%;

    height:60px;

    background:#000814;

    color:#00eaff;

    border:1px solid #00eaff;

    padding-left:20px;

    font-size:18px;

    box-sizing:border-box;

    box-shadow:
    inset 0 0 10px rgba(0,234,255,.3),
    0 0 10px rgba(0,234,255,.5);

    margin-bottom:15px;
}
textarea{

    width:100%;

    height:220px;

    background:#000814;

    color:#00eaff;

    border:1px solid #00eaff;

    padding:20px;

    font-size:18px;

    resize:none;

    box-sizing:border-box;

    box-shadow:
    inset 0 0 10px rgba(0,234,255,.3),
    0 0 10px rgba(0,234,255,.5);

    margin-bottom:20px;
}

.post{

    border:1px solid #00eaff;

    background:#041018;

    padding:18px;

    margin-top:15px;

    cursor:pointer;

    transition:.3s;

    box-shadow:
    0 0 8px rgba(0,234,255,.5);

    position:relative;
}

.post:hover{

    transform:translateX(8px);

    box-shadow:
    0 0 15px #00eaff,
    0 0 30px rgba(0,234,255,.7);
}

#viewBox{

    display:none;

    margin-top:20px;

    border:1px solid #00ffff;

    padding:15px;

    box-shadow:
    0 0 10px #00ffff;
}

.mainTitle{

    text-align:center;

    font-size:70px;

    letter-spacing:8px;

    color:#00eaff;

    margin-top:20px;

    margin-bottom:10px;

    text-shadow:
    0 0 10px #00eaff,
    0 0 20px #00eaff,
    0 0 40px #00eaff;
}

.subTitle{

    text-align:center;

    color:#00eaff;

    letter-spacing:3px;

    margin-bottom:40px;

    opacity:0.8;
}    

.listHeader{

    font-size:28px;

    font-weight:bold;

    color:#00eaff;

    margin-top:20px;

    margin-bottom:20px;

    border-bottom:1px solid #00eaff;

    padding-bottom:10px;

    text-shadow:
    0 0 10px #00eaff;
}

.listIcon{

    color:#00eaff;

    margin-right:10px;
}    
    
</style>
</head>

<body>

<!-- 첫 화면 -->

<div id="homePage">

<div class="box">

<h1 class="mainTitle">
BPS TERMINAL
</h1>

<div class="subTitle">
SECURE PERSONAL ARCHIVE SYSTEM
</div>

<button onclick="enterSystem()">
ACCESS
</button>

</div>

</div>

<!-- 게시판 화면 -->

<div id="boardPage">

<div class="listHeader">

    <span class="listIcon">■</span>

    LIST

</div>

<input
id="titleInput"
placeholder="제목">

<textarea
id="contentInput"
placeholder="내용"></textarea>

<br><br>

<button onclick="addPost()">
SAVE LOG
</button>

<div id="postList"></div>

<div id="viewBox">

<h3 id="viewTitle"></h3>

<div
id="dateInfo"
style="
float:right;
text-align:right;
font-size:12px;
color:#888;
">
</div>

<p id="viewContent"></p>

<button onclick="editPost()">
수정
</button>

<button onclick="deletePost()">
삭제
</button>

</div>

</div>

<script>

let posts = [];

let currentPost = -1;

function enterSystem(){

    document.getElementById("homePage").style.display =
    "none";

    document.getElementById("boardPage").style.display =
    "block";
}

function addPost(){

    const title =
    document.getElementById("titleInput").value;

    const content =
    document.getElementById("contentInput").value;

    if(title === "" || content === ""){

        alert("제목과 내용을 입력하세요");

        return;
    }

    const now = new Date();

const dateString =
now.getFullYear() + "-" +
String(now.getMonth()+1).padStart(2,"0") + "-" +
String(now.getDate()).padStart(2,"0") + " " +
String(now.getHours()).padStart(2,"0") + ":" +
String(now.getMinutes()).padStart(2,"0");

posts.push({

    title:title,

    content:content,

    created:dateString,

    updated:dateString,

    edited:false
});

    savePosts();

    renderPosts();

    document.getElementById("titleInput").value = "";

    document.getElementById("contentInput").value = "";
}

function renderPosts(){

    const list =
    document.getElementById("postList");

    list.innerHTML = "";

    posts.forEach((post,index)=>{

        const div =
        document.createElement("div");

        div.className = "post";

        div.innerHTML =
        div.innerHTML =

div.innerHTML =

"<div style='display:flex;justify-content:space-between;'>"

+

"<span style='font-size:18px;font-weight:bold;'>"

+ post.title +

"</span>"

+

"<span style='color:#00eaff;font-size:12px;opacity:.7;'>"

+

(post.edited ? "* " : "")

+

post.updated

+

"</span>"

+

"</div>";

        div.onclick = function(){

            openPost(index);
        };

        list.prepend(div);
    });
}

function openPost(index){

    currentPost = index;

    document.getElementById("viewBox").style.display =
    "block";

    document.getElementById("viewTitle").innerText =
    posts[index].title;

    document.getElementById("viewContent").innerText =
    posts[index].content;

document.getElementById("dateInfo").innerHTML =

"작성일<br>" +

posts[index].created +

"<br><br>" +

"최종수정<br>" +

posts[index].updated;


document.getElementById("titleInput").value =
posts[index].title;

document.getElementById("contentInput").value =
posts[index].content;
}

function editPost(){

    if(currentPost < 0){

        return;
    }

    posts[currentPost].title =
    document.getElementById("titleInput").value;

    posts[currentPost].content =
    document.getElementById("contentInput").value;

const now = new Date();

posts[currentPost].updated =

now.getFullYear() + "-" +
String(now.getMonth()+1).padStart(2,"0") + "-" +
String(now.getDate()).padStart(2,"0") + " " +
String(now.getHours()).padStart(2,"0") + ":" +
String(now.getMinutes()).padStart(2,"0");

posts[currentPost].edited = true;

    savePosts();

    renderPosts();

    openPost(currentPost);

    alert("수정 완료");
}

function deletePost(){

    if(currentPost < 0){

        return;
    }

    posts.splice(currentPost,1);

    savePosts();

    renderPosts();

    document.getElementById("viewBox").style.display =
    "none";
}

function savePosts(){

    localStorage.setItem(
        "bps_posts",
        JSON.stringify(posts)
    );
}

function loadPosts(){

    const saved =
    localStorage.getItem("bps_posts");

    if(saved){

        posts =
        JSON.parse(saved);

        renderPosts();
    }
}

loadPosts();

</script>

</body>
</html>
