<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>bps</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    background:black;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
}

/* 움직이는 네온 배경 */

body::before{
    content:"";

    position:absolute;
    width:200%;
    height:200%;

    background:
    radial-gradient(circle, #00ffff22 10%, transparent 10%),
    radial-gradient(circle, #ff00ff22 10%, transparent 10%);

    background-size:120px 120px;

    animation:moveBg 10s linear infinite;

    z-index:-2;
}

/* 어두운 오버레이 */

body::after{
    content:"";

    position:absolute;
    width:100%;
    height:100%;

    background:rgba(0,0,0,0.7);

    z-index:-1;
}

/* 배경 움직임 */

@keyframes moveBg{
    from{
        transform:translate(0,0);
    }

    to{
        transform:translate(-120px,-120px);
    }
}

/* 중앙 패널 */

.box{
    color:#00ffff;

    text-align:center;

    border:2px solid #00ffff;

    padding:40px;

    border-radius:20px;

    box-shadow:
    0 0 20px #00ffff,
    0 0 40px #00ffff;

    background:rgba(0,0,0,0.4);

    backdrop-filter:blur(5px);
}

/* 제목 */

h1{
    font-size:50px;

    text-shadow:
    0 0 10px #00ffff,
    0 0 20px #00ffff;

    animation:flicker 2s infinite;
}

/* 깜빡임 효과 */

@keyframes flicker{
    0%{opacity:1;}
    50%{opacity:0.8;}
    100%{opacity:1;}
}

/* 버튼 */

button{
    margin-top:20px;

    background:#ff00ff;

    color:white;

    border:none;

    padding:15px 40px;

    font-size:20px;

    border-radius:10px;

    cursor:pointer;

    box-shadow:
    0 0 10px #ff00ff,
    0 0 20px #ff00ff;

    transition:0.3s;
}

button:hover{
    transform:scale(1.1);

    box-shadow:
    0 0 20px #ff00ff,
    0 0 40px #ff00ff;
}

p{
    color:#00ff99;

    margin-top:10px;

    letter-spacing:3px;
}

</style>
</head>

<body>

<div class="box">

<h1>bps</h1>

<p id="terminal"></p>

<button onclick="alert('ACCESS GRANTED')">

ENTER

</button>

<br><br>

<textarea id="postInput"
placeholder="WRITE LOG..."
style="
width:300px;
height:100px;
background:black;
color:#00ffcc;
border:1px solid #00ffff;
padding:10px;
font-size:16px;
"></textarea>

<br><br>

<button onclick="addPost()">
SAVE LOG
</button>

<div id="posts"
style="
margin-top:30px;
text-align:left;
width:300px;
"></div>

</div>
<script>

const text = [
"CONNECTING TO NETWORK...",
"BYPASSING SECURITY...",
"ACCESSING MAINFRAME...",
"ACCESS GRANTED"
];

let line = 0;
let char = 0;

const terminal = document.getElementById("terminal");

function typeEffect(){

    if(line < text.length){

        if(char < text[line].length){

            terminal.innerHTML += text[line].charAt(char);

            char++;

            setTimeout(typeEffect, 50);

        }else{

            terminal.innerHTML += "<br>";

            line++;

            char = 0;

            setTimeout(typeEffect, 500);
        }
    }
}

typeEffect();

function addPost(){

    const input =
    document.getElementById("postInput");

    const posts =
    document.getElementById("posts");

    if(input.value.trim() !== ""){

        const newPost =
        document.createElement("div");

        newPost.style.border =
        "1px solid #00ffff";

        newPost.style.padding =
        "10px";

        newPost.style.marginTop =
        "10px";

        newPost.style.boxShadow =
        "0 0 10px #00ffff";

        newPost.innerHTML =
        "🟢 LOG ENTRY<br><br>" +
        input.value;

        posts.prepend(newPost);

        input.value = "";
    }
}

</script>
</body>
</html>
